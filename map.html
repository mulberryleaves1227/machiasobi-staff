<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  padding: 16px;
}

h1 {
  color: #fff;
  font-size: clamp(14px, 3vw, 20px);
  margin-bottom: 4px;
  letter-spacing: 0.05em;
  text-align: center;
}
h1 span { color: #f0c040; }

.back-link {
  display: inline-block;
  color: #aaa;
  font-size: 12px;
  text-decoration: none;
  margin-bottom: 10px;
  padding: 4px 10px;
  border: 1px solid #444;
  border-radius: 20px;
}
.back-link:hover { color: #fff; border-color: #888; }

.dev-mode-btn {
  display: none;
  margin-bottom: 8px;
  font-size: 11px;
  color: #0f0;
  background: rgba(0,255,0,0.08);
  border: 1px solid #0f0;
  border-radius: 4px;
  padding: 3px 10px;
  cursor: pointer;
}

/* ── Overview Map ── */
.map-wrapper {
  position: relative;
  width: 100%;
  max-width: 900px;
  border: 2px solid #444;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.map-wrapper.dev-mode { cursor: crosshair; }
.map-wrapper img { width: 100%; height: auto; display: block; }

/* ── Markers (shared) ── */
.marker {
  position: absolute;
  transform: translate(-50%, -100%);
  cursor: pointer;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.15s ease;
}
.marker:hover { transform: translate(-50%, -100%) scale(1.2); z-index: 20; }

.marker-pin {
  width: 22px;
  height: 22px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  border: 2px solid rgba(0,0,0,0.3);
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.marker-label {
  font-size: 9px;
  white-space: nowrap;
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 1px 4px;
  border-radius: 3px;
  margin-top: 2px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.marker:hover .marker-label { opacity: 1; }

/* Category colors */
.cat-stage    .marker-pin { background: #e74c3c; }
.cat-shop     .marker-pin { background: #3498db; }
.cat-food     .marker-pin { background: #27ae60; }
.cat-facility .marker-pin { background: #f39c12; }
.cat-event    .marker-pin { background: #9b59b6; }

/* Area marker (drill-down) */
.cat-area .marker-pin {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  transform: rotate(0deg);
  background: #f0c040 !important;
  border: 2px solid rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Popup ── */
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200;
  justify-content: center;
  align-items: center;
  padding: 16px;
}
.popup-overlay.active { display: flex; }

.popup {
  background: #fff;
  border-radius: 12px;
  width: 100%;
  max-width: 360px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: popIn 0.18s ease;
}
@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.popup-header {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  color: #fff;
}
.popup-category { font-size: 10px; opacity: 0.85; margin-bottom: 2px; letter-spacing: 0.08em; }
.popup-name { font-size: 16px; font-weight: bold; line-height: 1.3; }
.popup-close {
  background: rgba(255,255,255,0.25);
  border: none;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  font-size: 16px;
  cursor: pointer;
  color: #fff;
  flex-shrink: 0;
  margin-left: 8px;
  line-height: 28px;
  text-align: center;
}
.popup-body { padding: 14px 16px; color: #333; font-size: 13px; line-height: 1.65; }
.popup-body p { margin-bottom: 8px; }
.popup-body p:last-child { margin-bottom: 0; }

.tt-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
  padding: 10px 12px;
  background: #1a1a2e;
  color: #f0c040;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
  text-decoration: none;
}
.tt-btn:hover { background: #2c2c50; }
.tt-btn.sub {
  margin-top: 6px;
  background: #3d5166;
  color: #cde;
}
.tt-btn.sub:hover { background: #4e677f; }

.local-map-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
  padding: 10px 12px;
  background: #f0c040;
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
}
.local-map-btn:hover { background: #d4a800; }

/* ── Legend ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  margin-top: 12px;
  justify-content: center;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #ccc; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }
.legend-dot.cat-stage    { background: #e74c3c; }
.legend-dot.cat-shop     { background: #3498db; }
.legend-dot.cat-food     { background: #27ae60; }
.legend-dot.cat-facility { background: #f39c12; }
.legend-dot.cat-event    { background: #9b59b6; }
.legend-dot.cat-area     { background: #f0c040; border-radius: 3px; }

/* ── Local Map Modal ── */
.local-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  flex-direction: column;
}
.local-modal-overlay.active { display: flex; }

.local-modal {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
}
.local-modal-header {
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0d0d1e;
  border-bottom: 1px solid #333;
  flex-shrink: 0;

.local-modal-title { color: #f0c040; font-size: 15px; font-weight: bold; }
.local-modal-close {
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  font-size: 17px;
  cursor: pointer;
  color: #fff;
  line-height: 30px;
  text-align: center;
}

.floor-tabs {
  display: flex;
  gap: 0;
  flex-shrink: 0;
  background: #0d0d1e;
  padding: 8px 16px;

.floor-tab {
  padding: 5px 18px;
  border: 1px solid #555;
  background: transparent;
  color: #aaa;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  transition: all 0.15s;
}
.floor-tab:first-child { border-radius: 6px 0 0 6px; }
.floor-tab:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
.floor-tab.active { background: #f0c040; color: #1a1a2e; border-color: #f0c040; }

.local-modal-body {
  overflow-y: auto;

.local-map-wrap {

.local-map-wrap img { width: 100%; height: auto; display: block; }

/* Smaller pins inside local map */
.local-map-wrap .marker-pin { width: 18px; height: 18px; }

/* ── Dev coord display ── */
.dev-coord {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.88);
  color: #0f0;
  font-family: monospace;
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 4px;
  z-index: 9999;
  pointer-events: none;
  display: none;
}
</style>

      'yuzu-soft': {
        x: 76, y: 66, cat: 'shop', floor: '1F',
        name: 'ゆずソフトショップ出張所',
        desc: '「天使☆アイノーツ」「ぼーるぺん＝か？」「実妹疑惑」のPOP UPショップ。',
      },
      'cc2-trif': {
        x: 76, y: 78, cat: 'shop', floor: '1F',
        name: 'CC2×TriFスタジオ×Spiral Stairs 合同ブース',
        desc: 'サイバーコネクトツー・TriFスタジオ・Spiral Stairs Studio合同出展。',
      },
    },
  },
};

// ================================================================
// カテゴリ設定
// ================================================================
const catConfig = {
  stage:    { color: '#e74c3c', label: 'ステージ' },
  shop:     { color: '#3498db', label: 'ショップ' },
  food:     { color: '#27ae60', label: 'フード' },
  facility: { color: '#f39c12', label: '施設' },
  event:    { color: '#9b59b6', label: 'イベント' },
  area:     { color: '#b8922a', label: 'エリア' },
};

// ================================================================
// 要地図マーカー生成
// ================================================================
function buildOverviewMarkers() {
  const wrapper = document.getElementById('mapWrapper');
  Object.entries(spots).forEach(([id, s]) => {
    const el = document.createElement('div');
    el.className = `marker cat-${s.cat}`;
    el.style.cssText = `left:${s.x}%;top:${s.y}%`;
    el.innerHTML = `<div class="marker-pin"></div><div class="marker-label">${s.name}</div>`;
    el.addEventListener('click', () => openPopup(id, s));
    wrapper.appendChild(el);
  });
}

// ================================================================
// ローカルマップマーカー生成
// ================================================================
function buildLocalMarkers(mapId, floorFilter) {
  const wrap = document.getElementById('localMapWrap');
  wrap.querySelectorAll('.marker').forEach(m => m.remove());

  const lm = localMaps[mapId];
  Object.entries(lm.spots).forEach(([id, s]) => {
    if (floorFilter && floorFilter !== '全て' && s.floor && s.floor !== floorFilter) return;
    const el = document.createElement('div');
    el.className = `marker cat-${s.cat}`;
    el.style.cssText = `left:${s.x}%;top:${s.y}%`;
    const floorBadge = s.floor
      ? `<span style="font-size:8px;background:#f0c040;color:#1a1a2e;padding:0 3px;border-radius:2px;margin-right:2px;font-weight:bold">${s.floor}</span>`
      : '';
    el.dataset.floor = s.floor || '';
    el.innerHTML = `<div class="marker-pin"></div><div class="marker-label">${floorBadge}${s.name}</div>`;
    el.addEventListener('click', e => { e.stopPropagation(); openPopup(id, s); });
    wrap.appendChild(el);
  });
}

// ================================================================
// ポップアップ
// ================================================================
function openPopup(id, s) {
  const cfg = catConfig[s.cat] || catConfig.shop;
  document.getElementById('popupCategory').textContent = cfg.label + (s.floor ? `  [${s.floor}]` : '');
  document.getElementById('popupName').textContent = s.name;
  document.getElementById('popupHeader').style.background = cfg.color;

  let body = `<p>${s.desc}</p>`;

  if (s.ttVenue !== undefined) {
    body += `<a class="tt-btn" href="index.html?tab=tt&venue=${s.ttVenue}" target="_blank">📅 タイムテーブルを見る</a>`;
  }
  if (s.ttVenueAlt) {
    body += `<a class="tt-btn sub" href="index.html?tab=tt&venue=${s.ttVenueAlt.idx}" target="_blank">📅 ${s.ttVenueAlt.label}</a>`;
  }
  if (s.localMap) {
    body += `<button class="local-map-btn" onclick="openLocalMap('${s.localMap}');closePopup();">🗺 詳細マップを開く</button>`;
  }

  document.getElementById('popupBody').innerHTML = body;
  document.getElementById('popupOverlay').classList.add('active');
}

function closePopup() {
  document.getElementById('popupOverlay').classList.remove('active');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('popupOverlay')) closePopup();
}

// ================================================================
// ローカルマップ
// ================================================================
let currentLocalMapId = null;

function openLocalMap(mapId) {
  const lm = localMaps[mapId];
  currentLocalMapId = mapId;

  document.getElementById('localMapTitle').textContent = lm.title;
  document.getElementById('localMapImg').src = lm.image;
  document.getElementById('localMapImg').alt = lm.title;

  // フロアタブ
  const tabsEl = document.getElementById('floorTabs');
  tabsEl.innerHTML = '';
  if (lm.floors) {
    tabsEl.style.display = 'flex';
    lm.floors.forEach((f, i) => {
      const btn = document.createElement('button');
      btn.className = 'floor-tab' + (i === 0 ? ' active' : '');
      btn.textContent = f;
      btn.onclick = () => switchFloor(mapId, f);
      tabsEl.appendChild(btn);
    });
    buildLocalMarkers(mapId, lm.floors[0]);
  } else {
    tabsEl.style.display = 'none';
    buildLocalMarkers(mapId, null);
  }

  document.getElementById('localModalOverlay').classList.add('active');
}

function closeLocalMap() {
  document.getElementById('localModalOverlay').classList.remove('active');
  currentLocalMapId = null;
}

function switchFloor(mapId, floor) {
  document.querySelectorAll('.floor-tab').forEach(t => t.classList.toggle('active', t.textContent === floor));
  buildLocalMarkers(mapId, floor);
}

// ================================================================
// Dev mode: 座標クリッカー (?dev=1 で有効)
// ================================================================
let devOn = false;

function initDevMode() {
  if (!new URLSearchParams(location.search).has('dev')) return;
  document.getElementById('devToggle').style.display = 'inline-block';
  document.getElementById('devCoord').style.display = 'block';

  // 要地図クリック
  document.getElementById('mapWrapper').addEventListener('click', function(e) {
    if (!devOn) return;
    const rect = this.querySelector('img').getBoundingClientRect();
    log(e, rect, '要地図');
  });

  // ローカルマップクリック
  document.getElementById('localMapWrap').addEventListener('click', function(e) {
    if (!devOn) return;
    const rect = this.querySelector('img').getBoundingClientRect();
    log(e, rect, currentLocalMapId || 'local');
  });
}

function log(e, rect, label) {
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
  const str = `[${label}] x:${x}  y:${y}`;
  document.getElementById('devCoord').textContent = str;
  console.log(`x: ${x}, y: ${y},`);
  navigator.clipboard?.writeText(`x: ${x}, y: ${y},`);
}

function toggleDev() {
  devOn = !devOn;
  document.getElementById('mapWrapper').classList.toggle('dev-mode', devOn);
  document.getElementById('devToggle').textContent = devOn ? '🛠 座標クリッカー ON (クリックで座標コピー)' : '🛠 座標クリッカー OFF';
}

// ================================================================
// Init
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  buildOverviewMarkers();
  initDevMode();
});
</script>
</body>
</html>
