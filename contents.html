<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンテンツ検索 | マチ★アソビ vol.30</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:14px;background:#f5f5f5;color:#222;overscroll-behavior:none}
/* ── header ── */
.header{background:#1a1a2e;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:14px;font-weight:bold;line-height:1.3}
.header-sub{font-size:11px;color:#aaa}
/* ── search bar ── */
.search-wrap{padding:10px 12px 6px;position:sticky;top:52px;z-index:50;background:#f5f5f5}
.search-wrap input{width:100%;padding:10px 14px;font-size:15px;border:2px solid #ddd;border-radius:10px;background:#fff;outline:none;-webkit-appearance:none}
.search-wrap input:focus{border-color:#e94560}
.result-count{font-size:11px;color:#888;padding:0 4px 6px;text-align:right}
/* ── content area ── */
.content-area{padding:0 12px 80px}
/* ── card ── */
.con-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #ccc}
.con-card.kind-stage{border-left-color:#e94560}
.con-card.kind-booth{border-left-color:#4a90d9}
.con-card.kind-talk{border-left-color:#ff8c00}
.con-card.kind-screening_talk{border-left-color:#9b59b6}
.con-card.kind-screening{border-left-color:#9b59b6}
.con-card.kind-booth_event{border-left-color:#4a90d9}
.con-card.kind-sauna{border-left-color:#27ae60}
.card-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.kind-badge{font-size:10px;font-weight:bold;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.badge-stage{background:#ffeef1;color:#e94560}
.badge-booth{background:#eef3ff;color:#4a90d9}
.badge-talk{background:#fff4e6;color:#ff8c00}
.badge-screening_talk{background:#f5eeff;color:#9b59b6}
.badge-screening{background:#f5eeff;color:#9b59b6}
.badge-booth_event{background:#eef3ff;color:#4a90d9}
.badge-sauna{background:#eafaf1;color:#27ae60}
.card-title{font-size:14px;font-weight:bold;color:#1a1a2e;line-height:1.4}
.card-body{font-size:13px;line-height:1.7;color:#333}
.card-row{display:flex;gap:6px;margin-bottom:2px}
.card-label{color:#888;white-space:nowrap;min-width:3em;flex-shrink:0}
.card-val{flex:1}
.card-note{margin-top:6px;font-size:12px;background:#fffbf0;border-left:3px solid #ffd700;padding:5px 8px;border-radius:0 4px 4px 0;color:#666;line-height:1.5}
.card-link{display:block;margin-top:8px;font-size:12px;color:#4a90d9;text-decoration:none}
.card-link:hover{text-decoration:underline}
.map-link{color:#4a90d9;text-decoration:none;font-size:13px}
.map-link:hover{text-decoration:underline}
.venue-detail{color:#666}
/* ── empty / loading ── */
.empty-msg{text-align:center;color:#aaa;padding:60px 20px;font-size:15px;line-height:2}
.loading-msg{text-align:center;color:#aaa;padding:40px 20px;font-size:14px}
/* ── bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;display:flex;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.1)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px;cursor:pointer;color:#888;font-size:10px;gap:2px;min-height:56px;border:none;background:none;text-decoration:none}
.nav-item.active{color:#e94560}
.nav-item .icon{font-size:20px}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-title">マチ★アソビ vol.30</div>
    <div class="header-sub">コンテンツ・出演者検索</div>
  </div>
</header>

<div class="search-wrap">
  <input type="search" id="search-input" placeholder="🔍 作品名・出演者・ブース・エリアなど…" autocomplete="off" autofocus>
  <div class="result-count" id="result-count"></div>
</div>

<div class="content-area" id="card-area">
  <div class="loading-msg">読み込み中…</div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a class="nav-item" href="index.html#report"><span class="icon">🆘</span>報告</a>
  <a class="nav-item" href="index.html#shift"><span class="icon">📋</span>シフト別</a>
  <a class="nav-item" href="index.html#tt"><span class="icon">📅</span>タイムライン</a>
  <a class="nav-item active"><span class="icon">🎭</span>コンテンツ</a>
  <a class="nav-item" href="index.html#basic"><span class="icon">📖</span>基本知識</a>
</nav>

<script>
const KIND_LABELS = {
  stage: 'ステージ', talk: 'トーク', screening_talk: '上映&トーク',
  screening: '上映会', booth: 'ブース', booth_event: 'ブースイベント', sauna: 'サウナ'
};
const KIND_BADGE = {
  stage: 'badge-stage', talk: 'badge-talk', screening_talk: 'badge-screening_talk',
  screening: 'badge-screening', booth: 'badge-booth', booth_event: 'badge-booth_event', sauna: 'badge-sauna'
};

// ── Google Maps リンク ──
const gmap = (lat, lng) => `https://www.google.com/maps?q=${lat},${lng}`;

const AREA_MAP = {
  '藍場浜公園':             gmap(34.0738828, 134.5471712),
  '新町橋東公園':           gmap(34.0711314, 134.54841),
  '両国橋西公園':           gmap(34.0686499, 134.5501962),
  'ufotable CINEMA':        gmap(34.0706597, 134.5476485),
  'あわぎんホール':         gmap(34.0750473, 134.5462638),
  'アミコ':                 gmap(34.0736446, 134.5500951),
  'しんまちボードウォーク': gmap(34.0706401, 134.5489015),
  '東新町商店街':           gmap(34.0698461, 134.5481209),
  'ポッポ街商店街':         gmap(34.0748566, 134.5490948),
  'マチ★アソビサウナ（新町川）': gmap(34.0700951, 134.5501114),
};

// 複数拠点の特殊ケース
const VENUE_MULTI = {
  '献血ルーム アミコ / 献血バス（あわぎんホール東側 ご成婚広場）': [
    { label: '献血ルームアミコ',           url: gmap(34.0735032, 134.548611) },
    { label: 'ご成婚広場（献血バス）', url: gmap(34.0743566, 134.546873) },
  ],
};

function buildLocHtml(area, venue) {
  // 複数拠点チェック
  const multi = VENUE_MULTI[venue];
  if (multi) {
    const links = multi.map(m =>
      `<a href="${m.url}" target="_blank" rel="noopener" class="map-link">📍 ${m.label}</a>`
    ).join('<br>');
    return `<div class="card-row"><span class="card-label">場所</span><span class="card-val">${links}</span></div>`;
  }
  // 通常ケース
  const areaUrl = AREA_MAP[area];
  const areaHtml = areaUrl
    ? `<a href="${areaUrl}" target="_blank" rel="noopener" class="map-link">📍 ${area}</a>`
    : (area || '');
  const venueDetail = (venue && venue !== area) ? `<span class="venue-detail"> / ${venue}</span>` : '';
  const locHtml = areaHtml + venueDetail;
  return locHtml ? `<div class="card-row"><span class="card-label">場所</span><span class="card-val">${locHtml}</span></div>` : '';
}

function fmtDate(d) {
  if (!d) return '';
  const parts = d.split('/');
  return parts.map(p => {
    const m = p.match(/\d{4}-(\d{2})-(\d{2})/);
    if (!m) return p;
    const day = ['日', '月', '火', '水', '木', '金', '土'];
    const dt = new Date(p);
    return `${parseInt(m[1])}/${parseInt(m[2])}(${day[dt.getDay()]})`;
  }).join('・');
}

function fmtTime(s, e) {
  if (!s) return '';
  return e ? `${s}〜${e}` : `${s}〜`;
}

function buildCard(r) {
  const a = r.appearance;
  const kind = a.kind || 'stage';
  const label = KIND_LABELS[kind] || kind;
  const badge = KIND_BADGE[kind] || 'badge-stage';

  const dateStr = fmtDate(a.date);
  const timeStr = fmtTime(a.start_time, a.end_time);
  const datetime = [dateStr, timeStr].filter(Boolean).join(' ');
  const people = (a.people || []).filter(Boolean).join('、');
  const source = r.source?.url || '';

  const rows = [];
  if (datetime) rows.push(`<div class="card-row"><span class="card-label">日時</span><span class="card-val">${datetime}</span></div>`);
  const locHtml = buildLocHtml(a.area, a.venue);
  if (locHtml) rows.push(locHtml);
  if (a.action) rows.push(`<div class="card-row"><span class="card-label">内容</span><span class="card-val">${a.action}</span></div>`);
  if (people) rows.push(`<div class="card-row"><span class="card-label">出演</span><span class="card-val">${people}</span></div>`);
  if (r.organization) rows.push(`<div class="card-row"><span class="card-label">主催</span><span class="card-val">${r.organization}</span></div>`);

  const noteHtml = a.notes ? `<div class="card-note">⚠️ ${a.notes}</div>` : '';
  const linkHtml = source ? `<a class="card-link" href="${source}" target="_blank" rel="noopener">🔗 公式ページ →</a>` : '';

  return `
<div class="con-card kind-${kind}" data-id="${r.id}">
  <div class="card-head">
    <span class="kind-badge ${badge}">${label}</span>
    <span class="card-title">${r.display_name}</span>
  </div>
  <div class="card-body">
    ${rows.join('\n    ')}
    ${noteHtml}
    ${linkHtml}
  </div>
</div>`;
}

let allRecords = [];

function normalizeQuery(q) {
  return q.toLowerCase().replace(/[　\s]+/g, '').replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}

function search(q) {
  if (!q) return allRecords;
  const nq = normalizeQuery(q);
  return allRecords.filter(r => {
    const terms = (r.search?.search_terms || []).concat(r.search?.normalized_search_terms || []);
    return terms.some(t => t.toLowerCase().replace(/[　\s]+/g, '').includes(nq));
  });
}

function sortRecords(records) {
  // kind 優先: ステージ→ブース系→上映系→その他
  const kindOrder = { stage: 0, booth_event: 1, booth: 2, parasol: 3, talk: 4, photo_session: 5, screening_talk: 6, screening: 7, sauna: 8 };
  return [...records].sort((a, b) => {
    const ka = kindOrder[a.appearance.kind] ?? 9;
    const kb = kindOrder[b.appearance.kind] ?? 9;
    if (ka !== kb) return ka - kb;
    // 同種別内: 日付→開始時刻
    const da = a.appearance.date?.split('/')[0] || '';
    const db = b.appearance.date?.split('/')[0] || '';
    if (da !== db) return da < db ? -1 : 1;
    const ta = a.appearance.start_time || '99:99';
    const tb = b.appearance.start_time || '99:99';
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });
}

function render(records) {
  const area = document.getElementById('card-area');
  const countEl = document.getElementById('result-count');
  if (records.length === 0) {
    area.innerHTML = '<div class="empty-msg">😢 該当するコンテンツが見つかりませんでした<br><small>別のキーワードをお試しください</small></div>';
    countEl.textContent = '';
    return;
  }
  const sorted = sortRecords(records);
  area.innerHTML = sorted.map(buildCard).join('');
  countEl.textContent = `${records.length}件`;
}

// Load data
fetch('search_data.json')
  .then(r => r.json())
  .then(data => {
    allRecords = data.records || [];
    const input = document.getElementById('search-input');

    // 初期表示：全件
    render(allRecords);

    input.addEventListener('input', () => {
      const q = input.value.trim();
      const results = search(q);
      render(results);
    });
  })
  .catch(err => {
    document.getElementById('card-area').innerHTML =
      '<div class="empty-msg">⚠️ データの読み込みに失敗しました<br><small>サーバーが起動しているか確認してください</small></div>';
    console.error(err);
  });
</script>
</body>
</html>
